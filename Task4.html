<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
</head>

<div style="background-color: aquamarine; padding: 20px; border-radius: 10px; max-width: 600px;">
    <h2 style="text-align: center;"><strong>ZUKODE REGISTRATION FORM</strong></h2>

    <form style="color: black;">
        <div style="margin-bottom: 15px;">
            <label for="text-input" style="display: block; margin-bottom: 5px;"><strong>First Name</strong></label>
            <input type="text" id="text-input" placeholder="John(example)"
                style="width: 70%; padding: 8px; border: 3px solid #ddd; border-radius: 4px;">
        </div>

        <div style="margin-bottom: 15px;">
            <label for="Last Name" style="display: block; margin-bottom: 5px;"><strong>Last Name</strong></label>
            <input type="text" id="text-input" placeholder="Doe(example)"
                style="width: 70%; padding: 8px; border: 3px solid #ddd; border-radius: 4px;">
        </div>

        <div style="margin-bottom: 15px;">
            <label for="Email" style="display: block; margin-bottom: 5px;"><strong>Email</strong></label>
            <input type="text" id="text-input" placeholder="johndoe@gmail.com(example)"
                style="width: 70%; padding: 8px; border: 3px solid #ddd; border-radius: 4px;">
        </div>

        <div style="margin-bottom: 15px;">
            <label for="Password" style="display: block; margin-bottom: 5px;"><strong>Password</strong></label>
            <input type="text" id="text-input" placeholder="***********"
                style="width: 70%; padding: 8px; border: 3px solid #ddd; border-radius: 4px;">
        </div>

        <div style="margin-bottom: 15px;">
            <label for="Age" style="display: block; margin-bottom: 5px;"><strong>Age</strong></label>
            <input type="number" id="text-input" placeholder="Enter your age"
                style="width: 70%; padding: 8px; border: 3px solid #ddd; border-radius: 4px;">
        </div>

        
        <fieldset style="border: 2px solid black; border-radius: 8px; padding: 15px; margin-bottom: 20px;">
            <legend style="font-weight: bold; color: black;">Gender(select one):</legend>

            <div>
            <p><label><input type="radio" name="Gender" value="Male">Male</label></p>
            <p><label><input type="radio" name="Gender" value="Female">Female</label></p>
            </div>
        </fieldset>
        
        <fieldset style="border: 2px solid black; border-radius: 8px; padding: 15px; margin-bottom: 20px;">
            <legend style="font-weight: bold; color: black;">Interests:</legend>
            <div>
                <p><label><input type="checkbox" name="Interests" value="Python">Python</label></p>
                <p><label><input type="checkbox" name="Interests" value="HTML">HTML</label></p>
                <p><label><input type="checkbox" name="Interests" value="JavaScript">JaveScript</label></p>
                <p><label><input type="checkbox" name="Interests" value="CSS">CSS</label></p>
            </div>
        </fieldset>

        <div style="margin-bottom: 15px;">
            <label for="country" style="display:block; margin-bottom: 5px; font-weight: bold;">Country:</label>
            <select id="country" name="country" style="width: 100%; padding: 8px; border: 2px solid #ddd; border-radius: 5px;">
                <option value="">Select your country...</option>
                <option value="us">United States</option>
                <option value="uk">United Kingdom</option>
                <option value="ca">Canada</option>
                <option value="ng">Nigeria</option>
                <option value="ke">Kenya</option>
            </select>
        </div>

        <button type="submit" style="background-color: rgb(8, 13, 0); color: whitesmoke; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">
            Submit Survey
        </button>
    </form>

</div>
</body>
</html>
